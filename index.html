<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Обязанности">
<meta name="theme-color" content="#2d6a4f">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Мои обязанности</title>
<style>
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --border: #e2e0d8;
  --border-strong: #c8c5ba;
  --text: #1a1918;
  --text-muted: #8a8780;
  --accent: #2d6a4f;
  --accent-text: #1b4332;
  --today-bg: #fff8e6;
  --today-border: #f4a823;
  --done-bg: #e8f5ee;
  --done-color: #2d6a4f;
  --week-bg: #f0faf4;
  --cat-bg: #f2f0eb;
  --radius: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412; --surface: #1e1d1b; --border: #2e2d2a;
    --border-strong: #3d3c38; --text: #e8e6df; --text-muted: #6b6966;
    --accent: #52b788; --accent-text: #95d5b2;
    --today-bg: #1f1a0f; --today-border: #c47a0a;
    --done-bg: #162820; --done-color: #74c69d;
    --week-bg: #111f17; --cat-bg: #242320;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px; overflow-x: hidden;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(12px + var(--safe-top)) 16px 12px;
  position: sticky; top: 0; z-index: 100;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.reset-btn {
  font-size: 12px; padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--border-strong); background: transparent;
  color: var(--text-muted); cursor: pointer;
}

.week-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border-strong); background: transparent;
  color: var(--text); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.nav-btn:disabled { opacity: 0.25; pointer-events: none; }
.week-info { flex: 1; text-align: center; }
.week-range { font-size: 13px; font-weight: 500; }
.week-rel { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.cur-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 4px; vertical-align: middle; }

/* TABS */
.tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); }
.day-tabs {
  display: flex; overflow-x: auto; gap: 2px;
  padding: 8px 12px 0; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 8px 12px 9px;
  border-radius: 8px 8px 0 0;
  border: 1px solid transparent; border-bottom: none;
  background: transparent; color: var(--text-muted);
  font-size: 13px; font-weight: 500; cursor: pointer;
  position: relative; white-space: nowrap;
}
.day-tab.active { background: var(--bg); border-color: var(--border); color: var(--text); font-weight: 600; }
.day-tab.is-today { color: var(--today-border); }
.day-tab.is-today.active { border-top: 2px solid var(--today-border); }
.tab-badge {
  position: absolute; top: 4px; right: 4px;
  min-width: 16px; height: 16px; border-radius: 8px;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700; line-height: 16px;
  text-align: center; padding: 0 3px;
}

/* MAIN */
.main { padding: 0 0 calc(24px + var(--safe-bottom)); }

/* DAY PANEL */
.panel { display: none; }
.panel.active { display: block; }
.day-hdr {
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; justify-content: space-between;
}
.day-hdr-name { font-size: 15px; font-weight: 600; }
.day-hdr-date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.badge-today {
  font-size: 11px; background: var(--today-bg); color: var(--today-border);
  border: 1px solid var(--today-border); border-radius: 20px;
  padding: 3px 10px; font-weight: 600;
}
.badge-view {
  font-size: 11px; background: var(--cat-bg); color: var(--text-muted);
  border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px;
}

.cat-label {
  padding: 7px 16px 5px;
  font-size: 10px; font-weight: 700; color: var(--text-muted);
  letter-spacing: 0.07em; text-transform: uppercase;
  background: var(--cat-bg); border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
}
.duty-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 0.5px solid var(--border);
  background: var(--surface); cursor: pointer; user-select: none;
  transition: background 0.1s;
}
.duty-row:active { background: var(--bg); }
.duty-row.checked { background: var(--done-bg); }
.duty-row.ro { cursor: default; }
.cb {
  width: 24px; height: 24px; border-radius: 7px;
  border: 1.5px solid var(--border-strong); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.duty-row.checked .cb { background: var(--accent); border-color: var(--accent); }
.ck { display: none; color: #fff; font-size: 15px; font-weight: 800; line-height: 1; }
.duty-row.checked .ck { display: block; }
.duty-text { flex: 1; font-size: 14px; line-height: 1.45; }
.duty-row.checked .duty-text { color: var(--done-color); }
.note-tag {
  font-size: 10px; color: var(--text-muted);
  background: var(--cat-bg); border-radius: 4px;
  padding: 2px 6px; flex-shrink: 0;
}

/* WEEK SUMMARY */
.week-panel { display: none; }
.week-panel.active { display: block; background: var(--surface); }
.week-hdr {
  padding: 14px 16px; background: var(--week-bg);
  border-bottom: 1px solid var(--border);
}
.week-hdr h2 { font-size: 15px; font-weight: 600; color: var(--accent-text); }
.week-hdr p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

.wtable { width: 100%; border-collapse: collapse; font-size: 12px; }
.wtable th {
  padding: 8px 6px; text-align: center; font-weight: 500;
  color: var(--text-muted); border-bottom: 1px solid var(--border);
  font-size: 10px; letter-spacing: 0.04em;
}
.wtable th:first-child { text-align: left; padding-left: 16px; min-width: 120px; }
.wtable td { padding: 9px 6px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.wtable td:first-child { padding-left: 16px; font-size: 12px; }
.wtable td:not(:first-child) { text-align: center; }
.wtable tr:last-child td { border-bottom: none; }
.wcat td {
  background: var(--cat-bg); font-size: 10px; font-weight: 700;
  color: var(--text-muted); letter-spacing: 0.07em;
  text-transform: uppercase; padding: 6px 16px;
}
.dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
.edot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--border-strong); opacity: 0.35; }
.tcell { font-weight: 700; color: var(--accent-text); font-size: 14px; }
.tzero { color: var(--text-muted); }

.week-foot {
  padding: 14px 16px; background: var(--week-bg);
  border-top: 1px solid var(--border);
  display: flex; gap: 24px; flex-wrap: wrap;
}
.foot-item { font-size: 12px; color: var(--text-muted); }
.foot-item strong { display: block; font-size: 20px; font-weight: 700; color: var(--accent-text); line-height: 1.2; }

/* LOADING */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 200px; color: var(--text-muted); font-size: 14px;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">Мои обязанности</div>
    <button class="reset-btn" id="resetBtn">Сбросить</button>
  </div>
  <div class="week-nav">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="week-info">
      <div class="week-range" id="weekRange">—</div>
      <div class="week-rel" id="weekRel"></div>
    </div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
</header>

<div class="tabs-wrap">
  <div class="day-tabs" id="dayTabs"></div>
</div>

<div class="main" id="main">
  <div class="loading">Загрузка…</div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const DUTIES = [
  { cat: '🍽 Кухня и питание', items: [
    { id: 'dishes',    name: 'Мытьё посуды' },
    { id: 'breakfast', name: 'Приготовление завтрака (оба дома)' },
    { id: 'lunch',     name: 'Приготовление обеда / ужина' },
  ]},
  { cat: '🛒 Покупки и снабжение', items: [
    { id: 'shoplist',    name: 'Составление списка покупок' },
    { id: 'shopweekend', name: 'Покупка продуктов на несколько дней', note: 'Выходные' },
    { id: 'shopspot',    name: 'Покупка продуктов точечно' },
    { id: 'waterorder',  name: 'Заказ воды' },
    { id: 'waterfill',   name: 'Набор воды в пятишки' },
    { id: 'clothes',     name: 'Покупка одежды всем' },
  ]},
  { cat: '🧹 Уборка и порядок', items: [
    { id: 'trash',    name: 'Вынос мусора каждый день' },
    { id: 'diapers',  name: 'Вынос подгузников (раз в два дня)' },
    { id: 'beds',     name: 'Заправка кроватей' },
    { id: 'dryclean', name: 'Сухая уборка' },
    { id: 'wetclean', name: 'Влажная уборка' },
    { id: 'bathroom', name: 'Уборка в санузлах' },
    { id: 'mirrors',  name: 'Мытьё зеркал' },
    { id: 'windows',  name: 'Мытьё стёкол (тёплое время года)' },
  ]},
  { cat: '👕 Стирка и одежда', items: [
    { id: 'wash', name: 'Стирка' },
    { id: 'dry',  name: 'Сушка' },
    { id: 'fold', name: 'Раскладывание одежды по местам' },
  ]},
  { cat: '💊 Здоровье и аптечка', items: [
    { id: 'medcheck', name: 'Проверка сроков в аптечке' },
    { id: 'doctor',   name: 'Запись к врачу' },
  ]},
  { cat: '💡 Коммунальное и финансы', items: [
    { id: 'utility',  name: 'Оплата ЖКХ' },
    { id: 'internet', name: 'Оплата интернета' },
  ]},
  { cat: '🚗 Авто', items: [
    { id: 'driving',    name: 'Вождение', note: 'Получить права' },
    { id: 'carservice', name: 'ТО, мойка, заправка и прочее', note: 'Получить права' },
    { id: 'carsalon',   name: 'Уборка в салоне' },
  ]},
  { cat: '👶 Ребёнок и семья', items: [
    { id: 'bath', name: 'Купание сына' },
    { id: 'walk', name: 'Прогулки (оба дома)' },
  ]},
];

const DAY_NAMES  = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const DAY_SHORT  = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
const realToday = new Date(); realToday.setHours(0,0,0,0);

function sundayOf(d) {
  const x = new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate() - x.getDay()); return x;
}
function wkey(sun) { return sun.toISOString().slice(0,10); }
function weekDays(key) {
  const sun = new Date(key + 'T00:00:00');
  return Array.from({length:7}, (_,i) => { const d = new Date(sun); d.setDate(sun.getDate()+i); return d; });
}
function shiftWeek(key, n) {
  const s = new Date(key + 'T00:00:00'); s.setDate(s.getDate() + n*7); return wkey(sundayOf(s));
}
function fmtDate(d) { return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'}); }

const curWeekKey = wkey(sundayOf(realToday));
let viewKey = curWeekKey;
let activeTab = realToday.getDay();

// ── INDEXEDDB ─────────────────────────────────────────────────────────────────
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('duties', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('days');
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => rej(req.error);
  });
}
function dbGet(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction('days','readonly');
    const req = tx.objectStore('days').get(key);
    req.onsuccess = () => res(req.result || {});
    req.onerror = () => rej(req.error);
  });
}
function dbSet(key, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction('days','readwrite');
    const req = tx.objectStore('days').put(val, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
function dbDel(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction('days','readwrite');
    const req = tx.objectStore('days').delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
function dayKey(weekKey, i) { return `${weekKey}_d${i}`; }

// ── RENDER ────────────────────────────────────────────────────────────────────
async function render() {
  renderHeader();
  await renderTabs();
  await renderMain();
}

function renderHeader() {
  const days = weekDays(viewKey);
  document.getElementById('weekRange').textContent = fmtDate(days[0]) + ' — ' + fmtDate(days[6]);
  const rel = document.getElementById('weekRel');
  if (viewKey === curWeekKey) {
    rel.innerHTML = '<span class="cur-dot"></span>Текущая неделя';
  } else {
    const diff = Math.round((new Date(viewKey+'T00:00:00') - new Date(curWeekKey+'T00:00:00')) / (7*864e5));
    rel.textContent = diff === -1 ? 'Прошлая неделя' : diff < 0 ? Math.abs(diff)+' нед. назад' : 'Через '+diff+' нед.';
  }
  document.getElementById('nextBtn').disabled = viewKey === curWeekKey;
}

async function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  const days = weekDays(viewKey);
  for (let i = 0; i < 7; i++) {
    const data = await dbGet(dayKey(viewKey, i));
    const cnt = Object.values(data).filter(Boolean).length;
    const isT = viewKey === curWeekKey && days[i].getTime() === realToday.getTime();
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i===activeTab?' active':'') + (isT?' is-today':'');
    btn.innerHTML = DAY_SHORT[i] + (cnt>0 ? `<span class="tab-badge">${cnt}</span>` : '');
    btn.onclick = () => { activeTab = i; render(); };
    tabs.appendChild(btn);
  }
  const sb = document.createElement('button');
  sb.className = 'day-tab' + (activeTab===7?' active':'');
  sb.textContent = '📊 Итог';
  sb.onclick = () => { activeTab = 7; render(); };
  tabs.appendChild(sb);
}

async function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (activeTab === 7) { await renderSummary(main); return; }
  await renderDay(main);
}

async function renderDay(main) {
  const days = weekDays(viewKey);
  const i = activeTab;
  const day = days[i];
  const isToday = viewKey === curWeekKey && day.getTime() === realToday.getTime();
  const isFuture = day > realToday;
  const ro = !isToday && (viewKey !== curWeekKey || isFuture);
  const data = await dbGet(dayKey(viewKey, i));

  const panel = document.createElement('div');
  panel.className = 'panel active';

  const hdr = document.createElement('div');
  hdr.className = 'day-hdr';
  hdr.innerHTML = `<div><div class="day-hdr-name">${DAY_NAMES[i]}</div><div class="day-hdr-date">${fmtDate(day)}</div></div>` +
    (isToday ? '<span class="badge-today">Сегодня</span>' : (ro ? '<span class="badge-view">Просмотр</span>' : ''));
  panel.appendChild(hdr);

  DUTIES.forEach(cat => {
    const cl = document.createElement('div');
    cl.className = 'cat-label'; cl.textContent = cat.cat;
    panel.appendChild(cl);
    cat.items.forEach(duty => {
      const row = document.createElement('div');
      const checked = !!data[duty.id];
      row.className = 'duty-row' + (checked?' checked':'') + (ro?' ro':'');
      row.innerHTML = `<div class="cb"><span class="ck">✓</span></div><div class="duty-text">${duty.name}</div>` +
        (duty.note ? `<span class="note-tag">${duty.note}</span>` : '');
      if (!ro) {
        row.onclick = async () => {
          const d = await dbGet(dayKey(viewKey, i));
          d[duty.id] = !d[duty.id];
          await dbSet(dayKey(viewKey, i), d);
          render();
        };
      }
      panel.appendChild(row);
    });
  });
  main.appendChild(panel);
}

async function renderSummary(main) {
  const days = weekDays(viewKey);
  const panel = document.createElement('div');
  panel.className = 'week-panel active';

  const hdr = document.createElement('div');
  hdr.className = 'week-hdr';
  hdr.innerHTML = `<h2>Итог недели</h2><p>${fmtDate(days[0])} — ${fmtDate(days[6])}</p>`;
  panel.appendChild(hdr);

  const allData = await Promise.all(days.map((_,i) => dbGet(dayKey(viewKey,i))));
  const allItems = DUTIES.flatMap(c => c.items.map(it => ({...it, cat:c.cat})));

  const tbl = document.createElement('table');
  tbl.className = 'wtable';
  tbl.innerHTML = '<thead><tr><th>Обязанность</th>' +
    DAY_SHORT.map((d,i) => {
      const isT = viewKey===curWeekKey && days[i].getTime()===realToday.getTime();
      return `<th style="${isT?'color:var(--today-border)':''}">${d}</th>`;
    }).join('') + '<th>Итого</th></tr></thead>';
  const tbody = document.createElement('tbody');

  let lastCat = null, totalDone = 0, totalPossible = 0;
  allItems.forEach(duty => {
    if (duty.cat !== lastCat) {
      lastCat = duty.cat;
      const cr = document.createElement('tr'); cr.className = 'wcat';
      cr.innerHTML = `<td colspan="9">${duty.cat}</td>`;
      tbody.appendChild(cr);
    }
    const row = document.createElement('tr');
    let tot = 0;
    let cells = `<td>${duty.name}${duty.note?` <span style="font-size:10px;color:var(--text-muted)">(${duty.note})</span>`:''}</td>`;
    for (let d = 0; d < 7; d++) {
      const done = !!allData[d][duty.id];
      if (done) tot++;
      cells += `<td>${done?'<span class="dot"></span>':'<span class="edot"></span>'}</td>`;
    }
    cells += `<td class="${tot>0?'tcell':'tzero'}">${tot>0?tot:'—'}</td>`;
    row.innerHTML = cells;
    tbody.appendChild(row);
    totalDone += tot; totalPossible += 7;
  });
  tbl.appendChild(tbody);
  panel.appendChild(tbl);

  const foot = document.createElement('div');
  foot.className = 'week-foot';
  const pct = Math.round(totalDone/totalPossible*100);
  foot.innerHTML = `
    <div class="foot-item"><strong>${totalDone}</strong>выполнено</div>
    <div class="foot-item"><strong>${totalPossible}</strong>возможных</div>
    <div class="foot-item"><strong>${pct}%</strong>от максимума</div>
  `;
  panel.appendChild(foot);
  main.appendChild(panel);
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
document.getElementById('prevBtn').onclick = () => {
  viewKey = shiftWeek(viewKey, -1);
  activeTab = 7;
  render();
};
document.getElementById('nextBtn').onclick = () => {
  if (viewKey === curWeekKey) return;
  viewKey = shiftWeek(viewKey, 1);
  activeTab = viewKey === curWeekKey ? realToday.getDay() : 7;
  render();
};
document.getElementById('resetBtn').onclick = async () => {
  const label = viewKey === curWeekKey ? 'текущей' : 'выбранной';
  if (!confirm(`Сбросить все отметки ${label} недели?`)) return;
  for (let i = 0; i < 7; i++) await dbDel(dayKey(viewKey, i));
  render();
};

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
openDB().then(render).catch(err => {
  document.getElementById('main').innerHTML =
    `<div class="loading" style="color:red">Ошибка базы данных: ${err}</div>`;
});
</script>
</body>
</html>
